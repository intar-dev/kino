name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install just
        uses: taiki-e/install-action@v2.68.18
        with:
          tool: just

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2.68.18
        with:
          tool: cargo-nextest

      - name: Run checks
        run: just check

      - name: Install protobuf tools
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run Docker smoke test
        if: github.event_name == 'pull_request'
        run: just docker-smoke

      - name: Print container logs on failure
        if: failure() && github.event_name == 'pull_request'
        run: docker logs kino-k0s-ci || true

  build-static-linux:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
          - arch: arm64
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install cross
        uses: taiki-e/install-action@v2.68.18
        with:
          tool: cross

      - name: Build static binary
        run: cross build --locked --release -p kino --target ${{ matrix.target }}

      - name: Verify binary is static
        run: |
          file target/${{ matrix.target }}/release/kino
          file target/${{ matrix.target }}/release/kino | grep -q "statically linked"

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/kino dist/kino-linux-${{ matrix.arch }}
          chmod +x dist/kino-linux-${{ matrix.arch }}
          sha512sum dist/kino-linux-${{ matrix.arch }} > dist/kino-linux-${{ matrix.arch }}.sha512

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kino-linux-${{ matrix.arch }}
          path: |
            dist/kino-linux-${{ matrix.arch }}
            dist/kino-linux-${{ matrix.arch }}.sha512
          if-no-files-found: error
