name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install just
        uses: taiki-e/install-action@v2.68.17
        with:
          tool: just

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2.68.17
        with:
          tool: cargo-nextest

      - name: Run checks
        run: just check

      - name: Install protobuf tools
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Run Docker smoke test
        run: just docker-smoke

      - name: Print container logs on failure
        if: failure()
        run: docker logs kino-k0s-ci || true
