name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  build-and-upload:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-musl
          - arch: arm64
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.8.2

      - name: Install cross
        uses: taiki-e/install-action@v2.68.18
        with:
          tool: cross

      - name: Build static binary
        run: cross build --locked --release -p kino --target ${{ matrix.target }}

      - name: Verify binary is static
        run: |
          binary="target/${{ matrix.target }}/release/kino"
          file "${binary}"
          if readelf -d "${binary}" | grep -q "NEEDED"; then
            echo "Binary has dynamic library dependencies:" >&2
            readelf -d "${binary}" >&2
            exit 1
          fi

      - name: Package binary and checksum
        run: |
          mkdir -p dist
          asset_base="kino-${{ github.ref_name }}-linux-${{ matrix.arch }}"
          cp target/${{ matrix.target }}/release/kino "dist/${asset_base}"
          chmod +x "dist/${asset_base}"
          sha512sum "dist/${asset_base}" > "dist/${asset_base}.sha512"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/kino-${{ github.ref_name }}-linux-${{ matrix.arch }}" \
            "dist/kino-${{ github.ref_name }}-linux-${{ matrix.arch }}.sha512" \
            --clobber
